name: DAST Scan (OWASP ZAP)

on:
  # Deploy basariliyla bittikten sonra otomatik tetiklen
  workflow_run:
    workflows: ["Deploy to Production"]
    types:
      - completed
    branches:
      - main
  # Manuel tetikleme
  workflow_dispatch:
  # Haftalik dgenel saglık taramasi (her Pazartesi 03:00 UTC)
  schedule:
    - cron: '0 3 * * 1'

permissions:
  contents: read
  issues: write

jobs:
  zap-baseline:
    name: OWASP ZAP Baseline Scan
    runs-on: ubuntu-latest
    # Sadece deploy basariliysa veya manuel/scheduled
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'schedule' ||
      github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Wait for site to be fully up
        run: sleep 15

      - name: Run ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: 'https://infraguard.muhammedasef.com'
          cmd_options: '-a -j -m 5 -T 60'
          allow_issue_writing: false  # GitHub Issues'a otomatik yazmaz; ekstra gurultu olmasin
          fail_action: false  # Pipeline kirilmasin, bulgu olsa bile rapor uretsin

      - name: Upload ZAP report artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-baseline-report
          path: |
            report_html.html
            report_md.md
            report_json.json
          retention-days: 30