name: Deploy to Production

on:
  workflow_run:
    workflows: ["Security Scan"]
    types:
      - completed
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    # Sadece security pipeline basarili olduysa veya manuel tetiklendiyse calis
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Add VPS to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p ${{ secrets.VPS_PORT }} -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy via SSH
        run: |
          ssh -p ${{ secrets.VPS_PORT }} ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'EOF'
            cd /opt/infraguard-studio
            ./deploy.sh
          EOF

      - name: Notify success
        if: success()
        run: echo "Deploy basarili - https://infraguard.muhammedasef.com"

      - name: Notify failure
        if: failure()
        run: echo "Deploy basarisiz oldu, loglara bak"