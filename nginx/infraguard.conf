server {
    server_name infraguard.muhammedasef.com;
    # === SECURITY HEADERS ===
    # XSS / Injection koruması
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-eval' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; img-src 'self' data:; font-src 'self' data: https://cdn.jsdelivr.net; connect-src 'self' https://cdn.jsdelivr.net; worker-src 'self' blob:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none';" always;

    # MIME-sniff koruması
    add_header X-Content-Type-Options "nosniff" always;

    # Clickjacking koruması (CSP frame-ancestors zaten kapsıyor ama ekstra)
    add_header X-Frame-Options "DENY" always;

    # HSTS (HTTPS zorla, 1 yıl)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Referrer policy
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Permissions policy (browser feature kısıtlamaları)
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=()" always;

    # Cross-Origin politikaları (ZAP COEP/COOP/CORP uyarıları için)
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Embedder-Policy "require-corp" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;

    # Frontend (statik dosyalar)
    root /opt/infraguard-studio/frontend/dist;
    index index.html;

    # Logs
    access_log /var/log/nginx/infraguard.access.log;
    error_log /var/log/nginx/infraguard.error.log;

    # Frontend SPA — tüm route'ları index.html'e yönlendir
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Backend API proxy
    location /api/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Tarama uzun sürebilir, timeout artır
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Büyük PDF response için
        proxy_buffering off;
    }

    # Static asset cache (1 yıl)
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|woff|woff2|ttf|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    listen [::]:443 ssl ipv6only=on; # managed by Certbot
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/infraguard.muhammedasef.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/infraguard.muhammedasef.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}
server {
    if ($host = infraguard.muhammedasef.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    listen [::]:80;
    server_name infraguard.muhammedasef.com;
    return 404; # managed by Certbot


}
